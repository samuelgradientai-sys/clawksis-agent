name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      # ruff lives in the `dev` optional-dependency group, which `uv run`
      # does not install by default — without this sync the step dies with
      # "Failed to spawn: ruff / No such file or directory".
      - run: uv sync --all-extras
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test:
    name: Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --all-extras
      # Per-file subprocess isolation (scripts/run_tests_parallel.py): the suite
      # relies on process isolation — ~40 test files delete project modules from
      # sys.modules to reload against a fresh env, which leaks across files under
      # a single-process ``pytest tests/`` run and causes order-dependent
      # failures (a later test holds a stale module while patch() targets a
      # re-imported one). Running one ``pytest <file>`` subprocess per file is
      # the isolation boundary the tests are written for.
      - run: uv run python scripts/run_tests_parallel.py
