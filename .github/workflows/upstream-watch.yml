name: upstream-watch

# Vigila los releases de NousResearch/hermes-agent. Si hay uno mas nuevo que
# el ultimo sync registrado en tools/upstream/sync_state.json, abre un issue
# con las release notes y los comandos para traerlo.

on:
  schedule:
    - cron: "23 11 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Comparar ultimo release de upstream vs sync_state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          LATEST=$(gh api repos/NousResearch/hermes-agent/releases/latest --jq .tag_name)
          SYNCED=$(jq -r '.last_synced_tag' tools/upstream/sync_state.json)
          echo "upstream: $LATEST | ultimo sync: $SYNCED"
          if [ "$LATEST" = "$SYNCED" ]; then
            echo "Al dia."
            exit 0
          fi
          # Dedup contra issues abiertos Y cerrados (--state all): una vez que
          # un humano cerro el aviso de un release (lo audito / decidio que
          # hacer), no volver a abrirlo en cada corrida. Solo se vuelve a
          # alertar con un release MAS nuevo (tag distinto). El last_synced_tag
          # queda intacto para que sync.py mantenga el baseline correcto.
          EXISTS=$(gh issue list --repo "$GITHUB_REPOSITORY" --state all \
            --search "in:title $LATEST" --json number --jq 'length')
          if [ "$EXISTS" != "0" ]; then
            echo "Ya existe un issue (abierto o cerrado) para $LATEST."
            exit 0
          fi
          NOTES=$(gh api repos/NousResearch/hermes-agent/releases/latest --jq '.body' | head -c 6000)
          {
            printf 'Upstream publico [`%s`](https://github.com/NousResearch/hermes-agent/releases/tag/%s) y el fork esta sincronizado hasta `%s`.\n\n' "$LATEST" "$LATEST" "$SYNCED"
            printf 'Para traerlo:\n\n```bash\npython tools/upstream/sync.py --target %s          # dry-run\npython tools/upstream/sync.py --target %s --apply  # aplicar\n```\n\n' "$LATEST" "$LATEST"
            printf '## Release notes de upstream\n\n%s\n' "$NOTES"
          } > /tmp/issue-body.md
          gh issue create --repo "$GITHUB_REPOSITORY" \
            --title "Upstream Hermes $LATEST disponible (ultimo sync: $SYNCED)" \
            --body-file /tmp/issue-body.md
