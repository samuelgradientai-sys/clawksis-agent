name: Lint (ruff)

# Blocking ``ruff check .`` — enforces the explicit rules in
# ``[tool.ruff.lint.select]`` (currently PLW1514, unspecified-encoding).
# Failure blocks merge so CI actually fails on a bare open()/read_text()/
# write_text() that defaults to locale encoding (cp1252 on Windows).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ruff-check:
    name: ruff check (blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      # Install ruff as a standalone tool so the blocking check below can be
      # invoked directly (no ``uv run`` prefix). The dev-group ruff is not on
      # PATH for a bare ``ruff`` call, so we pin it here.
      - run: uv tool install ruff
      # Blocking step — no --exit-zero, not masked by ``|| true``. A PLW1514
      # (or any selected-rule) violation fails the job and blocks merge.
      - name: ruff check (blocking)
        run: |
          ruff check .
      - name: ruff format check
        run: |
          ruff format --check .
