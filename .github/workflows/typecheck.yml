# .github/workflows/typecheck.yml
name: Typecheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          [ui-tui, web, apps/bootstrap-installer, apps/desktop, apps/shared]
      fail-fast: false # report all failures, not just the first one
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      # --ignore-scripts: typecheck only needs the TS sources + type defs, not
      # native builds. Skipping install scripts drops node-pty's node-gyp header
      # fetch (a transient pre-tsc flake) and is faster. (The workflow_call
      # centralization upstream uses needs a parent orchestrator + a sibling
      # lint workflow; Clawksis has a single typecheck job, so we keep the
      # direct push/PR trigger and adopt only the install hardening.)
      - run: npm ci --ignore-scripts
      - run: npm run --prefix ${{ matrix.package }} typecheck
